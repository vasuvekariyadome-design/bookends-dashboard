name: Daily dashboard refresh

on:
  schedule:
    - cron: '23 1 * * *'      # 01:23 UTC = 06:53 IST, every day
  workflow_dispatch: {}        # lets you (or me) run it on demand

permissions:
  contents: write              # allows the job to push the updated index.html

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Pull fresh Instagram data and rebuild index.html
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          GRAPH_VERSION: ${{ vars.GRAPH_VERSION }}   # optional override, e.g. v21.0
        run: node scripts/refresh.mjs

      - name: Commit & publish if anything changed
        run: |
          git config user.name "bookends-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No changes today."
          else
            git commit -m "Daily refresh — $(date -u +%Y-%m-%d)"
            git push
          fi
